name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: cd core && npx tsc
      - run: cd router && ../node_modules/.bin/tsc
      - run: cd frontend && npm run build

      # 复制运行时所需文件到打包目录
      - name: Prepare dist archive
        run: |
          mkdir -p package/dist/db/migrations package/core
          # frontend 构建产物在 frontend/dist/
          mkdir -p package/frontend-dist && cp -r frontend/dist/* package/frontend-dist/
          cp -r router/dist/ package/dist/
          cp -r router/src/db/migrations/ package/dist/db/migrations/
          cp router/package.json package/
          cp package-lock.json package/
          cp README.md package/
          # Core 包（@llm-router/core 是 router 的依赖）
          cp core/package.json package/core/
          cp -r core/dist/ package/core/dist/
          # 从已安装的 node_modules 复制 router 所需的包
          (cd package && npm ci --omit=dev 2>/dev/null || npm install --production 2>/dev/null || true)
          tar czf llm-simple-router-linux-x64.tar.gz -C package .

      # Docker 镜像推 GHCR
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./router/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 上传 tar.gz 到 Release Assets
      - uses: softprops/action-gh-release@v2
        with:
          files: llm-simple-router-linux-x64.tar.gz

      # npm publish - publish @llm-router/core
      - name: Publish @llm-router/core to npm
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          cd core && npm publish --access public
